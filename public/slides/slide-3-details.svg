      <text x="404" y="200" text-anchor="end" font-size="12" font-weight="500" fill="#4ade80" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">210.8%</text>
      <line x1="16" y1="214" x2="404" y2="214" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:720ms">
      <text x="16" y="232" font-size="12" fill="#64748b" style="white-space: pre;">Interest rate</text>
      <text x="404" y="232" text-anchor="end" font-size="12" font-weight="500" fill="#94a3b8" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">4.1% → 4.2%</text>
      <line x1="16" y1="246" x2="404" y2="246" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:840ms">
      <text x="16" y="264" font-size="12" fill="#64748b" style="white-space: pre;">Upfront fee</text>
      <text x="404" y="264" text-anchor="end" font-size="12" font-weight="500" fill="#f97316" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">87.50 BOLD (0.70%)</text>
      <line x1="16" y1="278" x2="404" y2="278" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:960ms">
      <text x="16" y="296" font-size="12" fill="#64748b" style="white-space: pre;">Gas cost</text>
      <text x="404" y="296" text-anchor="end" font-size="12" font-weight="500" fill="#64748b" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">0.0031 ETH ($6.63)</text>
      <line x1="16" y1="310" x2="404" y2="310" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slDropIn 0.8s cubic-bezier(0.16,1,0.3,1) both;animation-delay:1080ms">
      <text x="16" y="334" font-size="13" fill="#94a3b8" style="white-space: pre;"><tspan>This wallet borrowed an additional </tspan><tspan fill="#fff" font-weight="500">12,500 BOLD</tspan><tspan> against</tspan></text>
      <text x="16" y="355" font-size="13" fill="#94a3b8" style="white-space: pre;"><tspan>their existing WETH collateral. The upfront fee of </tspan><tspan fill="#f97316" font-weight="500">87.50 BOLD</tspan></text>
      <text x="16" y="376" font-size="13" fill="#94a3b8" style="white-space: pre;"><tspan>(0.70%) was deducted, bringing total debt to </tspan><tspan fill="#fff" font-weight="500">670,516.88</tspan></text>
      <text x="16" y="397" font-size="13" fill="#94a3b8" style="white-space: pre;"><tspan fill="#fff" font-weight="500">BOLD</tspan><tspan>. The collateral ratio remains healthy at </tspan><tspan fill="#4ade80" font-weight="500">210.8%</tspan><tspan>.</tspan></text>
    </g>
  </g>
</svg>