<?xml version="1.0" encoding="utf-8"?>
<svg width="600" height="450" viewBox="0 0 600 450" xmlns="http://www.w3.org/2000/svg" style="overflow:hidden; font-family:Inter, ui-sans-serif, system-ui, sans-serif;">
  <style>

@keyframes slFadeIn { from { opacity:0; } to { opacity:1; } }
@keyframes slDropIn { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
@keyframes slDropInBig { from { opacity:0; transform:translateY(-18px) scale(1.02); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes slDropInBar { from { opacity:0; transform:translateY(-8px); } to { opacity:1; transform:translateY(0); } }
@keyframes slSlideRight { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }
@keyframes slRowDrop { from { opacity:0; transform:translateY(-30px) scale(1.02); } to { opacity:1; transform:translateY(0) scale(1); } }
@keyframes slSpineGrow { from { opacity:0; transform:scaleY(0); } to { opacity:1; transform:scaleY(1); } }

  </style>
  <g transform="matrix(1, 0, 0, 1, 10, 10)">
    <g style="animation:slDropIn 0.8s cubic-bezier(0.16,1,0.3,1) both;animation-delay:0ms">
      <image href="/icons/tokens/weth.png" x="18" y="10" width="36" height="36" clip-path="circle(18px at 18px 18px)"/>
      <image href="/icons/tokens/bold.png" x="50" y="10" width="36" height="36" clip-path="circle(18px at 18px 18px)"/>
      <rect x="100" y="12" width="60" height="18" rx="4" fill="rgba(59,130,246,0.15)" stroke="rgba(59,130,246,0.3)" stroke-width="1"/>
      <text x="130" y="25" text-anchor="middle" font-size="10" font-weight="700" fill="#60a5fa" style="white-space: pre;">BORROW</text>
      <text x="168" y="26" font-size="13" font-weight="600" fill="#fff" style="white-space: pre;">+12,500.00 BOLD</text>
      <text x="100" y="46" font-size="11" fill="#64748b" style="white-space: pre; font-size: 11px;">Liquity V2 · WETH Branch · 14 Mar 2025</text>
    </g>
    <g style="animation:slDropIn 0.8s cubic-bezier(0.16,1,0.3,1) both;animation-delay:120ms">
      <text x="16" y="76" font-size="11" font-weight="600" fill="#64748b" letter-spacing="0.6" style="text-transform: uppercase; white-space: pre;">EVENT DETAILS</text>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:240ms">
      <text x="16" y="104" font-size="12" fill="#64748b" style="white-space: pre;">Debt change</text>
      <text x="404" y="104" text-anchor="end" font-size="12" font-weight="500" fill="#60a5fa" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">+12,500.00 BOLD</text>
      <line x1="16" y1="118" x2="404" y2="118" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:360ms">
      <text x="16" y="136" font-size="12" fill="#64748b" style="white-space: pre;">New total debt</text>
      <text x="404" y="136" text-anchor="end" font-size="12" font-weight="500" fill="#fff" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">670,516.88 BOLD</text>
      <line x1="16" y1="150" x2="404" y2="150" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:480ms">
      <text x="16" y="168" font-size="12" fill="#64748b" style="white-space: pre;">Collateral</text>
      <text x="404" y="168" text-anchor="end" font-size="12" font-weight="500" fill="#94a3b8" style="font-variant-numeric: tabular-nums; white-space: pre; font-size: 12px;">660.28 WETH (unchanged)</text>
      <line x1="16" y1="182" x2="404" y2="182" stroke="rgba(30,41,59,0.5)" stroke-width="1"/>
    </g>
    <g style="animation:slRowDrop 0.5s cubic-bezier(0.16,1,0.3,1) both;animation-delay:600ms">
